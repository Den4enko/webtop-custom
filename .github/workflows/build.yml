name: Build Custom Webtop

on:
  schedule:
    # Build automatically once a week to receive upstream security updates
    - cron: '0 3 * * 1'
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout your custom repository to get your Dockerfile snippet
      - name: Checkout custom repo
        uses: actions/checkout@v4

      # 2. Clone the original LinuxServer repository (only the fedora-kde branch)
      - name: Clone LinuxServer Webtop
        run: |
          git clone --single-branch --branch fedora-kde https://github.com/linuxserver/docker-webtop.git ls-webtop

      # 3. Modify the original Dockerfile on the fly
      - name: Patch Dockerfile
        run: |
          # Remove firefox and chromium from the original ls-webtop Dockerfile
          sed -i 's/firefox//g' ls-webtop/Dockerfile
          sed -i 's/chromium//g' ls-webtop/Dockerfile

          # Append your custom Dockerfile block to the end of the original one
          cat Dockerfile >> ls-webtop/Dockerfile

      # 4. Set up Docker Buildx for advanced building capabilities
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Authenticate to GitHub Container Registry (GHCR)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Build the image from the modified ls-webtop folder and push it
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./ls-webtop
          file: ./ls-webtop/Dockerfile
          push: true
          # The image will be published to ghcr.io/<your-username>/webtop-custom:latest
          tags: ghcr.io/${{ github.repository_owner }}/webtop-custom:latest
