name: Weekly Webtop Build

on:
  schedule:
    # Runs every Wednesday at 19:00 UTC (20:00/21:00 Germany time depending on DST)
    - cron: '0 19 * * 3'
  push:
    branches:
      - main           # Still allows manual trigger via push to main
  workflow_dispatch:   # Still allows manual trigger via GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch upstream root folder
        run: |
          git clone --single-branch --branch fedora-kde https://github.com/linuxserver/docker-webtop.git upstream
          cp -r upstream/root ./root
          rm -rf upstream

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Keep caching enabled to speed up builds if layers didn't change
          cache-from: type=gha
          cache-to: type=gha,mode=max
