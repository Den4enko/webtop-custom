name: Weekly Webtop Build

on:
  schedule:
    - cron: '0 19 * * 3'
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone LinuxServer Webtop
        run: |
          git clone --single-branch --branch fedora-kde https://github.com/linuxserver/docker-webtop.git ls-webtop

      - name: Patch Dockerfile
        run: |
          sed -i '/firefox/s/ &&/ || true &&/' ls-webtop/Dockerfile
          sed -i '/chromium/s/ &&/ || true &&/' ls-webtop/Dockerfile
          sed -i '/^[[:space:]]*firefox/d' ls-webtop/Dockerfile
          sed -i '/^[[:space:]]*chromium/d' ls-webtop/Dockerfile
          cat Dockerfile >> ls-webtop/Dockerfile

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ls-webtop
          file: ./ls-webtop/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
